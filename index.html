<!DOCTYPE html>
<html>
<head>
  <title>Investment Property Analyzer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#4CAF50">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
                  url('https://images.unsplash.com/photo-1560518883-ce09059eeffa');
      background-size: cover;
      background-position: center;
    }
    .container { max-width: 1200px; margin: auto; padding: 20px; }
    h1 { text-align: center; color: white; margin-bottom: 20px; }

    /* Desktop Grid */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: stretch; }
    .card { background: rgba(255,255,255,0.95); padding: 20px; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.25); display: flex; flex-direction: column; }
    .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-grow: 1; }
    label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }

    #analyzeBtn, #summary { width: 480px; max-width: 100%; margin: 15px auto; display: block; border-radius: 10px; font-size: 18px; text-align: center; }
    #analyzeBtn { padding: 14px; background: linear-gradient(90deg, #4CAF50, #2E7D32); color: white; border: none; cursor: pointer; transition: 0.3s; }
    #analyzeBtn:hover { background: linear-gradient(90deg, #66BB6A, #388E3C); }
    #summary { margin-top: 10px; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 25px 0; }
    .kpi { background: white; padding: 12px; border-radius: 10px; text-align: center; }
    .kpi-value { font-size: 18px; font-weight: bold; }
    .positive { color: #2E7D32; } 
    .negative { color: #C62828; } 
    .neutral { color: black; }

    .insights { background: white; padding: 12px; border-radius: 10px; margin-top: 20px; text-align: left; }

    table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 15px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background: #4CAF50; color: white; }

    .highlight-positive { background: #2E7D32; color: white; font-weight: bold; }

    .chart-container { margin-top: 25px; margin-bottom: 25px; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.95); }
    .monthly-table { margin-top: 15px; margin-bottom: 15px; }
    .hidden { display: none; }

    @media(max-width:1000px){
      .grid { grid-template-columns: 1fr; gap: 20px; }
    }

    /* --- MOBILE APP STYLES --- */
    .mobile-app { display: none; max-width: 450px; margin: auto; background: #f0f0f0; border-radius: 15px; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .mobile-app h2 { text-align: center; margin-bottom: 10px; }
    .mobile-app .step { display: none; }
    .mobile-app .step.active { display: block; }
    .mobile-app label { font-size: 14px; display: block; margin-bottom: 4px; }
    .mobile-app input[type="text"], .mobile-app input[type="number"], .mobile-app input[type="range"] { width: 100%; padding: 8px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
    .mobile-app .mobile-nav { display: flex; justify-content: space-between; margin-top: 10px; }
    .mobile-app .mobile-nav button { padding: 10px; border-radius: 10px; border: none; background: #4CAF50; color: white; font-weight: bold; cursor: pointer; flex: 1; margin: 0 5px; }
    .mobile-app .mobile-nav button.primary { background: linear-gradient(90deg, #4CAF50, #2E7D32); }
    .mobile-results { background: white; padding: 10px; border-radius: 12px; margin-top: 15px; max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>

<!-- --- DESKTOP VERSION --- -->
<div class="container">
<h1>🏡 Investment Property Analyzer</h1>

<div class="grid">
  <div class="card">
    <h3>Purchase & Financing</h3>
    <div class="input-group">
      <div><label>Purchase Price</label><input class="dollar" id="price" type="text" value="$350,000.0"></div>
      <div><label>Down Payment</label><input class="percent" id="down" type="text" value="40.0%"></div>
      <div><label>Interest Rate</label><input class="percent" id="rate" type="text" value="6.25%"></div>
      <div><label>Loan Term (Years)</label><input id="term" type="number" value="30"></div>
      <div><label>Closing Costs</label><input class="percent" id="closing" type="text" value="2.5%"></div>
    </div>
  </div>

  <div class="card">
    <h3>Income & Expenses</h3>
    <div class="input-group">
      <div><label>Monthly Rent</label><input class="dollar" id="rent" type="text" value="$2,850.0"></div>
      <div><label>Rent Growth</label><input class="percent" id="rentGrowth" type="text" value="3.0%"></div>
      <div><label>Vacancy</label><input class="percent" id="vacancy" type="text" value="5.0%"></div>
      <div><label>Management</label><input class="percent" id="management" type="text" value="10.0%"></div>
      <div><label>Maintenance</label><input class="percent" id="maintenance" type="text" value="10.0%"></div>
      <div><label>HOA</label><input class="dollar" id="hoa" type="text" value="$315.0"></div>
      <div><label>Annual Taxes</label><input class="dollar" id="taxes" type="text" value="$6,900.0"></div>
      <div><label>Annual Insurance</label><input class="dollar" id="insurance" type="text" value="$2,200.0"></div>
      <div><label>Expense Growth</label><input class="percent" id="expenseGrowth" type="text" value="3.0%"></div>
    </div>
  </div>

  <div class="card">
    <h3>Exit</h3>
    <div class="input-group">
      <div><label>Hold Years</label><input id="years" type="number" value="10"></div>
      <div><label>Appreciation</label><input class="percent" id="appreciation" type="text" value="3.0%"></div>
    </div>
  </div>
</div>

<button id="analyzeBtn">Analyze Deal</button>
<div id="summary" class="hidden"></div>

<div id="results" class="hidden">
  <div id="loanInfo" class="kpi-grid"></div>
  <div id="kpis" class="kpi-grid"></div>
  <div id="insights" class="insights"></div>
  <div class="chart-container card"><canvas id="chart"></canvas></div>
  <div class="monthly-table card">
    <h3>1st year financials</h3>
    <div id="monthlyTableContainer"></div>
  </div>
  <div class="card" id="table"></div>
</div>

</div>
<!-- --- END DESKTOP VERSION --- -->

<!-- --- MOBILE VERSION --- -->
<div class="mobile-app">
  <div class="step active" id="m-step1">
    <h2>🏡 Purchase</h2>
    <label>Purchase Price</label>
    <input class="dollar" id="m-price" type="text" value="$350,000.0">
    <label>Down Payment: <span id="m-down-val">40%</span></label>
    <input type="range" id="m-down" min="0" max="100" step="1" value="40">
    <label>Interest Rate: <span id="m-rate-val">6.25%</span></label>
    <input type="range" id="m-rate" min="0" max="15" step="0.05" value="6.25">
    <label>Loan Term</label>
    <input id="m-term" type="number" value="30">
  </div>

  <div class="step" id="m-step2">
    <h2>💰 Income</h2>
    <label>Monthly Rent</label>
    <input class="dollar" id="m-rent" value="$2,850.0">
    <label>Rent Growth: <span id="m-rg-val">3%</span></label>
    <input type="range" id="m-rg" min="0" max="10" step="0.5" value="3">
  </div>

  <div class="step" id="m-step3">
    <h2>📉 Expenses</h2>
    <label>Vacancy: <span id="m-vac-val">5%</span></label>
    <input type="range" id="m-vac" min="0" max="20" step="1" value="5">
    <label>Management: <span id="m-mgmt-val">10%</span></label>
    <input type="range" id="m-mgmt" min="0" max="20" step="1" value="10">
    <label>Maintenance: <span id="m-maint-val">10%</span></label>
    <input type="range" id="m-maint" min="0" max="20" step="1" value="10">
    <label>Taxes</label>
    <input class="dollar" id="m-taxes" value="$6,900.0">
    <label>Insurance</label>
    <input class="dollar" id="m-ins" value="$2,200.0">
    <label>HOA</label>
    <input class="dollar" id="m-hoa" value="$315.0">
  </div>

  <div class="step" id="m-step4">
    <h2>📈 Exit</h2>
    <label>Hold Years</label>
    <input id="m-years" type="number" value="10">
    <label>Appreciation: <span id="m-appr-val">3%</span></label>
    <input type="range" id="m-appr" min="0" max="10" step="0.5" value="3">
  </div>

  <div class="mobile-results hidden" id="m-results"></div>

  <div class="mobile-nav">
    <button onclick="prevStep()">←</button>
    <button onclick="nextStep()">→</button>
    <button onclick="analyzeMobile()" class="primary">Analyze</button>
  </div>
</div>
<!-- --- END MOBILE VERSION --- -->

<script>
/* --- DESKTOP JS --- */
function fmt(n){return n<0 ? '($'+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:1,maximumFractionDigits:1})+')' : '$'+n.toLocaleString(undefined,{minimumFractionDigits:1,maximumFractionDigits:1});}
function pct(n){return n.toFixed(1)+"%";}
function clsVal(val, type){
  if(type==='positiveIf>0') return val>0?'positive':'neutral';
  if(type==='negativeIf<0') return val<0?'negative':'positive';
  if(type==='dscr') return val<1?'negative':'positive';
  return 'neutral';
}
function calculateIRR(cf){let guess=0.1;for(let i=0;i<1000;i++){let npv=0,der=0;for(let t=0;t<cf.length;t++){npv+=cf[t]/Math.pow(1+guess,t);der-=t*cf[t]/Math.pow(1+guess,t+1);}let newGuess=guess-npv/der;if(Math.abs(newGuess-guess)<1e-6)return newGuess;guess=newGuess;}return guess;}

document.querySelectorAll('.percent').forEach(el=>{
  el.addEventListener('input', ()=> {
    let val = el.value.replace(/[^0-9.]/g,'');
    el.value = val ? val + '%' : '';
  });
});
function parsePercent(id){return parseFloat(document.getElementById(id).value.replace('%',''))/100;}

document.querySelectorAll('.dollar').forEach(el => {
  function formatDollar(val) {
    val = val.replace(/[^0-9.]/g,'');
    return val ? '$' + parseFloat(val).toLocaleString(undefined,{minimumFractionDigits:1,maximumFractionDigits:1}) : '';
  }
  el.value = formatDollar(el.value);
  el.addEventListener('input', () => {
    let pos = el.selectionStart;
    el.value = formatDollar(el.value);
    el.selectionStart = el.selectionEnd = pos;
  });
});

function analyze(){
  document.getElementById('results').classList.remove('hidden');
  document.getElementById('summary').classList.remove('hidden');

  let price=parseFloat(document.getElementById('price').value.replace(/[^0-9.]/g,''));
  let down=parsePercent('down');
  let rate=parsePercent('rate')/12;
  let term=parseFloat(document.getElementById('term').value)*12;
  let closing=parsePercent('closing');
  let rentVal=parseFloat(document.getElementById('rent').value.replace(/[^0-9.]/g,''));
  let rentGrowth=parsePercent('rentGrowth');
  let vacancy=parsePercent('vacancy');
  let mgmt=parsePercent('management');
  let maint=parsePercent('maintenance');
  let hoaVal=parseFloat(document.getElementById('hoa').value.replace(/[^0-9.]/g,''));
  let taxesVal=parseFloat(document.getElementById('taxes').value.replace(/[^0-9.]/g,''));
  let insVal=parseFloat(document.getElementById('insurance').value.replace(/[^0-9.]/g,''));
  let expGrowth=parsePercent('expenseGrowth');
  let yearsVal=parseFloat(document.getElementById('years').value);
  let appr=parsePercent('appreciation');

  let loan=price*(1-down);
  let mortgage=loan*(rate*Math.pow(1+rate,term))/(Math.pow(1+rate,term)-1);
  let annualDebt=mortgage*12;
  let downPay=price*down;
  let closeCost=price*closing;

  document.getElementById('loanInfo').innerHTML=`
    <div class='kpi'><div>Loan Amount</div><div class='kpi-value'>${fmt(loan)}</div></div>
    <div class='kpi'><div>Monthly Mortgage</div><div class='kpi-value'>${fmt(mortgage)}</div></div>
  `;

  let cashFlows=[-(downPay+closeCost)];
  let yearly=[], cumulative=[], rows=[];
  let r=rentVal, t=taxesVal, i=insVal, h=hoaVal;

  for(let y=1;y<=yearsVal;y++){
    let gross=r*12;
    let eff=gross*(1-vacancy);
    let exp=eff*(mgmt+maint)+t+i+h*12;
    let noi=eff-exp;
    let cash=noi-annualDebt;
    yearly.push(cash);
    cashFlows.push(cash);
    cumulative.push((cumulative[y-2]||0)+cash);
    rows.push(`<tr><td>${y}</td><td>${fmt(gross)}</td><td>${fmt(noi)}</td><td class='${cash<0?'negative':'positive'}'>${fmt(cash)}</td></tr>`);
    r*=1+rentGrowth; t*=1+expGrowth; i*=1+expGrowth; h*=1+expGrowth;
  }

  let sale=price*Math.pow(1+appr,yearsVal);
  cashFlows[cashFlows.length-1]+=sale-loan;

  let irr=calculateIRR(cashFlows);
  let dscr=yearly[0]/annualDebt;
  let capRate=(yearly[0]+annualDebt)/price;

  document.getElementById('kpis').innerHTML=`
    <div class='kpi'><div>IRR</div><div class='kpi-value'>${pct(irr*100)}</div></div>
    <div class='kpi'><div>DSCR</div><div class='kpi-value ${clsVal(dscr,'dscr')}'>${dscr.toFixed(2)}</div></div>
    <div class='kpi'><div>Cap Rate</div><div class='kpi-value'>${pct(capRate*100)}</div></div>
  `;

  document.getElementById('table').innerHTML=`<h3>Annual Summary</h3><table><tr><th>Year</th><th>Income</th><th>NOI</th><th>Cashflow</th></tr>${rows.join('')}</table>`;

  let summaryText = dscr<1 ? '⚠️ Risky investment' : '✅ Looks good';
  document.getElementById('insights').innerText=summaryText;

  const ctx = document.getElementById('chart').getContext('2d');
  if(window.chart) window.chart.destroy();
  window.chart = new Chart(ctx,{
    type:'line',
    data:{
      labels:yearly.map((_,i)=>i+1),
      datasets:[{label:'Cashflow', data:yearly, borderColor:'#4CAF50', backgroundColor:'rgba(76,175,80,0.2)'}]
    },
    options:{responsive:true,maintainAspectRatio:false}
  });

  let monthlyRows='';
  for(let m=0;m<12;m++){
    monthlyRows+=`<tr><td>${m+1}</td><td>${fmt(rentVal*(1+rentGrowth)**0)}</td><td>${fmt(annualDebt/12)}</td><td>${fmt(rentVal*(1+rentGrowth)**0 - annualDebt/12)}</td></tr>`;
  }
  document.getElementById('monthlyTableContainer').innerHTML=`<table><tr><th>Month</th><th>Income</th><th>Mortgage</th><th>Cashflow</th></tr>${monthlyRows}</table>`;
}

document.getElementById('analyzeBtn').addEventListener('click', analyze);

/* --- MOBILE JS --- */
let mStep=1;
function showStep(){document.querySelectorAll('.mobile-app .step').forEach((el,i)=>el.classList.toggle('active',i===mStep-1));}
function nextStep(){if(mStep<4)mStep++; showStep();}
function prevStep(){if(mStep>1)mStep--; showStep();}
document.getElementById('m-down').addEventListener('input', e=>document.getElementById('m-down-val').innerText=e.target.value+'%');
document.getElementById('m-rate').addEventListener('input', e=>document.getElementById('m-rate-val').innerText=e.target.value+'%');
document.getElementById('m-rg').addEventListener('input', e=>document.getElementById('m-rg-val').innerText=e.target.value+'%');
document.getElementById('m-vac').addEventListener('input', e=>document.getElementById('m-vac-val').innerText=e.target.value+'%');
document.getElementById('m-mgmt').addEventListener('input', e=>document.getElementById('m-mgmt-val').innerText=e.target.value+'%');
document.getElementById('m-maint').addEventListener('input', e=>document.getElementById('m-maint-val').innerText=e.target.value+'%');
document.getElementById('m-appr').addEventListener('input', e=>document.getElementById('m-appr-val').innerText=e.target.value+'%');

function analyzeMobile(){
  const mPrice=parseFloat(document.getElementById('m-price').value.replace(/[^0-9.]/g,''));
  const mDown=parseFloat(document.getElementById('m-down').value)/100;
  const mRate=parseFloat(document.getElementById('m-rate').value)/100/12;
  const mTerm=parseInt(document.getElementById('m-term').value)*12;
  const mRent=parseFloat(document.getElementById('m-rent').value.replace(/[^0-9.]/g,''));
  const mRentGrowth=parseFloat(document.getElementById('m-rg').value)/100;
  const mVac=parseFloat(document.getElementById('m-vac').value)/100;
  const mMgmt=parseFloat(document.getElementById('m-mgmt').value)/100;
  const mMaint=parseFloat(document.getElementById('m-maint').value)/100;
  const mTaxes=parseFloat(document.getElementById('m-taxes').value.replace(/[^0-9.]/g,''));
  const mIns=parseFloat(document.getElementById('m-ins').value.replace(/[^0-9.]/g,''));
  const mHoa=parseFloat(document.getElementById('m-hoa').value.replace(/[^0-9.]/g,''));
  const mYears=parseInt(document.getElementById('m-years').value);
  const mAppr=parseFloat(document.getElementById('m-appr').value)/100;

  const loan=mPrice*(1-mDown);
  const mortgage=loan*(mRate*Math.pow(1+mRate,mTerm))/(Math.pow(1+mRate,mTerm)-1);
  const annualDebt=mortgage*12;
  const cashFlows=[-(mPrice*mDown)];
  const yearly=[];

  let r=mRent, t=mTaxes, i=mIns, h=mHoa;
  for(let y=1;y<=mYears;y++){
    const gross=r*12;
    const eff=gross*(1-mVac);
    const exp=eff*(mMgmt+mMaint)+t+i+h*12;
    const noi=eff-exp;
    const cash=noi-annualDebt;
    yearly.push(cash);
    cashFlows.push(cash);
    r*=(1+mRentGrowth); t*=(1+0.03); i*=(1+0.03); h*=(1+0.03);
  }
  cashFlows[cashFlows.length-1]+=mPrice*Math.pow(1+mAppr,mYears)-loan;
  const irr=calculateIRR(cashFlows);
  const dscr=yearly[0]/annualDebt;
  const capRate=(yearly[0]+annualDebt)/mPrice;

  document.getElementById('m-results').classList.remove('hidden');
  document.getElementById('m-results').innerHTML=`
    <div>IRR: ${pct(irr*100)}</div>
    <div>DSCR: ${dscr.toFixed(2)}</div>
    <div>Cap Rate: ${pct(capRate*100)}</div>
    <div>${dscr<1 ? '⚠️ Risky investment' : '✅ Looks good'}</div>
  `;
}
</script>

</body>
</html>

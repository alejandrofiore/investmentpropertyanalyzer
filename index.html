<!DOCTYPE html>
<html>
<head>
  <title>Investment Property Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
                  url('https://images.unsplash.com/photo-1560518883-ce09059eeffa');
      background-size: cover;
      background-position: center;
    }

    h1 { text-align:center; color:white; }

    /* DESKTOP */
    .container { max-width:1200px; margin:auto; padding:20px; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
    .card { background:rgba(255,255,255,0.95); padding:20px; border-radius:12px; }

    input {
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
      margin-top:6px;
    }

    #analyzeBtn {
      margin:20px auto;
      display:block;
      padding:14px;
      background:#4CAF50;
      color:white;
      border:none;
      border-radius:10px;
      font-size:18px;
    }

    .kpi-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
      margin-top:20px;
    }

    .kpi {
      background:white;
      padding:12px;
      border-radius:10px;
      text-align:center;
    }

    /* MOBILE */
    .mobile { display:none; }

    @media(max-width:768px){
      .container { display:none; }
      .mobile { display:block; padding:16px; padding-bottom:100px; }
    }

    .step { display:none; }
    .step.active { display:block; }

    .ios-card {
      background:rgba(255,255,255,0.98);
      border-radius:20px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    .field { margin-bottom:12px; }
    .field label { font-size:13px; color:#666; display:block; margin-bottom:4px; }

    .input {
      width:100%;
      max-width:320px;
      margin:auto;
      display:block;
      padding:12px;
      font-size:16px;
      border-radius:12px;
      border:1px solid #ddd;
      background:#fafafa;
    }

    .nav {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      background:white;
      border-top:1px solid #ddd;
    }

    .nav button {
      flex:1;
      padding:16px;
      border:none;
      font-size:18px;
    }

    .primary { background:#34C759; color:white; }

    .results {
      background:white;
      border-radius:18px;
      padding:16px;
      margin-top:16px;
    }

    .kpis {
      display:flex;
      gap:10px;
      overflow-x:auto;
    }

    .kpi-small {
      min-width:110px;
      background:#f2f2f7;
      padding:10px;
      border-radius:10px;
      text-align:center;
    }
  </style>
</head>

<body>

<!-- DESKTOP -->
<div class="container">
<h1>🏡 Investment Property Analyzer</h1>

<div class="grid">
<div class="card">
<h3>Purchase</h3>
<input id="price" value="$350,000.0">
<input id="down" value="40%">
<input id="rate" value="6.25%">
<input id="term" value="30">
</div>

<div class="card">
<h3>Income</h3>
<input id="rent" value="$2,850.0">
<input id="rentGrowth" value="3%">
</div>

<div class="card">
<h3>Expenses</h3>
<input id="vacancy" value="5%">
<input id="management" value="10%">
<input id="maintenance" value="10%">
<input id="taxes" value="$6,900.0">
<input id="insurance" value="$2,200.0">
<input id="hoa" value="$315.0">
</div>
</div>

<button onclick="analyze()" id="analyzeBtn">Analyze Deal</button>

<div id="results" class="kpi-grid"></div>
</div>

<!-- MOBILE -->
<div class="mobile">

<div class="step active" id="s1">
<div class="ios-card">
<h2>Purchase</h2>
<div class="field"><label>Price</label><input class="input" id="m-price" value="$350,000.0"></div>
<div class="field"><label>Down %</label><input class="input" id="m-down" value="40"></div>
<div class="field"><label>Rate %</label><input class="input" id="m-rate" value="6.25"></div>
<div class="field"><label>Term</label><input class="input" id="m-term" value="30"></div>
</div>
</div>

<div class="step" id="s2">
<div class="ios-card">
<h2>Income</h2>
<div class="field"><label>Rent</label><input class="input" id="m-rent" value="$2,850.0"></div>
<div class="field"><label>Growth %</label><input class="input" id="m-growth" value="3"></div>
</div>
</div>

<div class="step" id="s3">
<div class="ios-card">
<h2>Expenses</h2>
<div class="field"><label>Vacancy %</label><input class="input" id="m-vacancy" value="5"></div>
<div class="field"><label>Mgmt %</label><input class="input" id="m-mgmt" value="10"></div>
<div class="field"><label>Maint %</label><input class="input" id="m-maint" value="10"></div>
<div class="field"><label>Taxes</label><input class="input" id="m-taxes" value="$6,900.0"></div>
<div class="field"><label>Insurance</label><input class="input" id="m-insurance" value="$2,200.0"></div>
<div class="field"><label>HOA</label><input class="input" id="m-hoa" value="$315.0"></div>
</div>
</div>

<div id="resultsM" class="results"></div>

<div class="nav">
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
<button onclick="analyzeMobile()" class="primary">Analyze</button>
</div>

</div>

<script>
function parse(n){return parseFloat(n.replace(/[^0-9.]/g,''));}
function pct(n){return n.toFixed(1)+'%';}
function fmt(n){return '$'+n.toLocaleString(undefined,{minimumFractionDigits:1});}

function analyze(){
let rent=parse(document.getElementById('rent').value);
let vac=parse(document.getElementById('vacancy').value)/100;
let mgmt=parse(document.getElementById('management').value)/100;
let maint=parse(document.getElementById('maintenance').value)/100;
let tax=parse(document.getElementById('taxes').value);
let ins=parse(document.getElementById('insurance').value);
let hoa=parse(document.getElementById('hoa').value);

let cf=rent*12*(1-vac)-(rent*12*(1-vac)*(mgmt+maint)+tax+ins+hoa*12);

document.getElementById('results').innerHTML=`
<div class="kpi">Annual Cash Flow<br>${fmt(cf)}</div>
`;
}

let step=1;
function show(){document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));document.getElementById('s'+step).classList.add('active');}
function next(){if(step<3){step++;show();}}
function prev(){if(step>1){step--;show();}}

function analyzeMobile(){
let rent=parse(document.getElementById('m-rent').value);
let vac=document.getElementById('m-vacancy').value/100;
let mgmt=document.getElementById('m-mgmt').value/100;
let maint=document.getElementById('m-maint').value/100;
let tax=parse(document.getElementById('m-taxes').value);
let ins=parse(document.getElementById('m-insurance').value);
let hoa=parse(document.getElementById('m-hoa').value);

let cf=rent*12*(1-vac)-(rent*12*(1-vac)*(mgmt+maint)+tax+ins+hoa*12);

document.getElementById('resultsM').innerHTML=`
<h2>Result</h2>
<div class="kpis">
<div class="kpi-small">Cash Flow<br>${fmt(cf)}</div>
</div>
`;
}
</script>

</body>
</html>

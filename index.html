<head>
  <title>Investment Property Analyzer</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#4CAF50">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
                  url('https://images.unsplash.com/photo-1560518883-ce09059eeffa');
      background-size: cover;
      background-position: center;
    }

    .container { max-width: 1200px; margin: auto; padding: 20px; }
    h1 { text-align: center; color: white; margin-bottom: 20px; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .card { background: rgba(255,255,255,0.95); padding: 20px; border-radius: 12px; }

    label { font-size: 14px; font-weight: bold; color: #555; }
    input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size:16px; }

    #analyzeBtn {
      width: 100%;
      max-width: 500px;
      margin: 20px auto;
      display: block;
      border-radius: 12px;
      font-size: 18px;
      padding: 16px;
      background: linear-gradient(90deg, #4CAF50, #2E7D32);
      color: white;
      border: none;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 25px 0;
    }

    .kpi { background: white; padding: 14px; border-radius: 12px; text-align: center; }
    .kpi-value { font-size: 20px; font-weight: bold; }

    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    th { background: #4CAF50; color: white; }

    /* 🔥 MOBILE FIX */
    @media(max-width:768px){
      .grid { grid-template-columns: 1fr; }

      h1 { font-size: 22px; }

      .card { padding: 16px; }

      input {
        font-size: 16px;
        padding: 14px;
      }

      #analyzeBtn {
        font-size: 20px;
        padding: 18px;
      }

      .kpi-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

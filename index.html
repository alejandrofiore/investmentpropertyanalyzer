<!DOCTYPE html>
<html>
<head>
  <title>Investment Property Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f2f2f7;
    }

    /* DESKTOP */
    .container { max-width: 1100px; margin:auto; padding:20px; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
    .card { background:white; padding:20px; border-radius:12px; }
    input { width:100%; padding:8px; margin-top:6px; }
    #analyzeBtn { margin:20px auto; display:block; padding:14px; background:#4CAF50; color:white; border:none; border-radius:10px; }
    .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
    .kpi { background:white; padding:12px; border-radius:10px; text-align:center; }

    /* MOBILE */
    .mobile { display:none; }

    @media(max-width:768px){
      .container { display:none; }
      .mobile { display:block; padding:16px; padding-bottom:100px; }
    }

    .step { display:none; }
    .step.active { display:block; animation:fade .25s ease; }

    @keyframes fade {
      from { opacity:0; transform:translateX(10px);}
      to { opacity:1; transform:translateX(0);}
    }

    /* iOS Card */
    .ios-card {
      background:white;
      border-radius:18px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
    }

    h2 { margin:0 0 10px 0; }

    /* Inputs */
    .input {
      width:100%;
      max-width:320px;
      margin:8px auto;
      display:block;
      padding:12px;
      font-size:17px;
      border-radius:12px;
      border:1px solid #ddd;
      background:#fafafa;
    }

    /* Slider row */
    .slider-row {
      max-width:320px;
      margin:14px auto;
    }

    .slider-label {
      display:flex;
      justify-content:space-between;
      font-size:13px;
      color:#666;
      margin-bottom:6px;
    }

    input[type=range] {
      width:100%;
    }

    /* NAV BAR */
    .nav {
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      display:flex;
      background:white;
      border-top:1px solid #ddd;
    }

    .nav button {
      flex:1;
      padding:16px;
      font-size:18px;
      border:none;
      background:white;
    }

    .primary {
      background:#34C759;
      color:white;
      font-weight:600;
    }

    /* RESULTS */
    .results {
      background:white;
      border-radius:18px;
      padding:16px;
      margin-top:16px;
    }

    .kpis {
      display:flex;
      gap:10px;
      overflow-x:auto;
      margin-top:10px;
    }

    .kpi-small {
      min-width:110px;
      background:#f2f2f7;
      border-radius:12px;
      padding:10px;
      text-align:center;
      font-size:14px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<!-- DESKTOP -->
<div class="container">
<h1>🏡 Investment Property Analyzer</h1>

<div class="grid">
<div class="card">
<h3>Purchase</h3>
<input id="price" value="$350,000.0">
<input id="down" value="40%">
<input id="rate" value="6.25%">
<input id="term" value="30">
</div>

<div class="card">
<h3>Income</h3>
<input id="rent" value="$2,850.0">
<input id="growth" value="3%">
</div>

<div class="card">
<h3>Expenses</h3>
<input id="vac" value="5%">
<input id="mgmt" value="10%">
<input id="maint" value="10%">
<input id="tax" value="$6,900.0">
<input id="ins" value="$2,200.0">
<input id="hoa" value="$315.0">
</div>
</div>

<button onclick="calcDesktop()" id="analyzeBtn">Analyze Deal</button>
<div id="resultsD" class="hidden"></div>
</div>

<!-- MOBILE -->
<div class="mobile">

<div class="step active" id="s1">
<div class="ios-card">
<h2>🏡 Purchase</h2>

<input class="input" id="m-price" value="$350,000.0">

<div class="slider-row">
<div class="slider-label"><span>Down Payment</span><span id="dval">40%</span></div>
<input type="range" id="m-down" min="0" max="100" value="40">
</div>

<div class="slider-row">
<div class="slider-label"><span>Interest Rate</span><span id="rval">6.25%</span></div>
<input type="range" id="m-rate" min="0" max="15" step="0.05" value="6.25">
</div>

<input class="input" id="m-term" value="30">
</div>
</div>

<div class="step" id="s2">
<div class="ios-card">
<h2>💰 Income</h2>

<input class="input" id="m-rent" value="$2,850.0">

<div class="slider-row">
<div class="slider-label"><span>Rent Growth</span><span id="gval">3%</span></div>
<input type="range" id="m-growth" min="0" max="10" value="3">
</div>
</div>
</div>

<div class="step" id="s3">
<div class="ios-card">
<h2>📉 Expenses</h2>

<div class="slider-row">
<div class="slider-label"><span>Vacancy</span><span id="vval">5%</span></div>
<input type="range" id="m-vac" min="0" max="20" value="5">
</div>

<div class="slider-row">
<div class="slider-label"><span>Management</span><span id="mval">10%</span></div>
<input type="range" id="m-mgmt" min="0" max="20" value="10">
</div>

<div class="slider-row">
<div class="slider-label"><span>Maintenance</span><span id="mtval">10%</span></div>
<input type="range" id="m-maint" min="0" max="20" value="10">
</div>

<input class="input" id="m-tax" value="$6,900.0">
<input class="input" id="m-ins" value="$2,200.0">
<input class="input" id="m-hoa" value="$315.0">
</div>
</div>

<div class="step" id="s4">
<div class="ios-card">
<h2>📈 Exit</h2>

<input class="input" id="m-years" value="10">

<div class="slider-row">
<div class="slider-label"><span>Appreciation</span><span id="aval">3%</span></div>
<input type="range" id="m-appr" min="0" max="10" value="3">
</div>
</div>
</div>

<div id="resultsM" class="results hidden"></div>

<div class="nav">
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
<button onclick="calcMobile()" class="primary">Analyze</button>
</div>

</div>

<script>
function fmt(n){return '$'+n.toLocaleString(undefined,{minimumFractionDigits:1});}
function pct(n){return n.toFixed(1)+'%';}
function parse(n){return parseFloat(n.replace(/[^0-9.]/g,''));}
function p(v){return parseFloat(v)/100;}

function IRR(cf){
let g=0.1;
for(let i=0;i<1000;i++){
let npv=0,d=0;
for(let t=0;t<cf.length;t++){
npv+=cf[t]/Math.pow(1+g,t);
d-=t*cf[t]/Math.pow(1+g,t+1);
}
let ng=g-npv/d;
if(Math.abs(ng-g)<1e-6)return ng;
g=ng;
}
return g;
}

/* DESKTOP */
function calcDesktop(){
let price=parse(document.getElementById('price').value);
let down=p(document.getElementById('down').value);
let rate=p(document.getElementById('rate').value)/12;
let term=document.getElementById('term').value*12;
let rent=parse(document.getElementById('rent').value);
let growth=p(document.getElementById('growth').value);
let vac=p(document.getElementById('vac').value);
let mgmt=p(document.getElementById('mgmt').value);
let maint=p(document.getElementById('maint').value);
let tax=parse(document.getElementById('tax').value);
let ins=parse(document.getElementById('ins').value);
let hoa=parse(document.getElementById('hoa').value);

let loan=price*(1-down);
let m=loan*(rate*Math.pow(1+rate,term))/(Math.pow(1+rate,term)-1);
let cf=(rent*12*(1-vac)-(rent*12*(1-vac)*(mgmt+maint)+tax+ins+hoa*12))-m*12;

document.getElementById('resultsD').classList.remove('hidden');
document.getElementById('resultsD').innerHTML=`<div class="kpi-grid"><div class="kpi">Cash Flow<br>${fmt(cf)}</div></div>`;
}

/* NAV */
let step=1;
function show(){document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));document.getElementById('s'+step).classList.add('active');}
function next(){if(step<4){step++;show();}}
function prev(){if(step>1){step--;show();}}

/* SLIDERS */
[['m-down','dval'],['m-rate','rval'],['m-growth','gval'],['m-vac','vval'],['m-mgmt','mval'],['m-maint','mtval'],['m-appr','aval']]
.forEach(([id,val])=>{
document.getElementById(id).oninput=e=>{
document.getElementById(val).innerText=e.target.value+'%';
};
});

/* MOBILE CALC */
function calcMobile(){
let price=parse(document.getElementById('m-price').value);
let down=document.getElementById('m-down').value/100;
let rate=document.getElementById('m-rate').value/100/12;
let term=document.getElementById('m-term').value*12;
let rent=parse(document.getElementById('m-rent').value);
let growth=document.getElementById('m-growth').value/100;
let vac=document.getElementById('m-vac').value/100;
let mgmt=document.getElementById('m-mgmt').value/100;
let maint=document.getElementById('m-maint').value/100;
let tax=parse(document.getElementById('m-tax').value);
let ins=parse(document.getElementById('m-ins').value);
let hoa=parse(document.getElementById('m-hoa').value);
let years=document.getElementById('m-years').value;
let appr=document.getElementById('m-appr').value/100;

let loan=price*(1-down);
let m=loan*(rate*Math.pow(1+rate,term))/(Math.pow(1+rate,term)-1);
let debt=m*12;

let cf=[-(price*down)];
let r=rent;

for(let y=1;y<=years;y++){
let eff=r*12*(1-vac);
let exp=eff*(mgmt+maint)+tax+ins+hoa*12;
let noi=eff-exp;
let cash=noi-debt;
cf.push(cash);
r*=1+growth;
}

let sale=price*Math.pow(1+appr,years);
cf[cf.length-1]+=sale*0.94;

let irr=IRR(cf)*100;
let coc=cf[1]/(price*down)*100;
let cap=((rent*12*(1-vac)-(rent*12*(1-vac)*(mgmt+maint)+tax+ins+hoa*12))/price)*100;
let dscr=(cf[1]+debt)/debt;

let score=irr*0.4+coc*0.3+cap*0.2+(cf[1]>0?5:-5);
let rating=score>15?"🔥 Great Deal":score>10?"👍 Good Deal":"⚠️ Risky";

document.getElementById('resultsM').classList.remove('hidden');
document.getElementById('resultsM').innerHTML=`
<h2>${rating}</h2>
<div class="kpis">
<div class="kpi-small">IRR<br>${pct(irr)}</div>
<div class="kpi-small">CoC<br>${pct(coc)}</div>
<div class="kpi-small">Cap<br>${pct(cap)}</div>
<div class="kpi-small">DSCR<br>${dscr.toFixed(1)}</div>
</div>
<p><b>Annual Cash Flow:</b> ${fmt(cf[1])}</p>
`;
}
</script>

</body>
</html>

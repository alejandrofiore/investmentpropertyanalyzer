<!DOCTYPE html>
<html>
<head>
  <title>Investment Property Analyzer</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#4CAF50">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
                  url('https://images.unsplash.com/photo-1560518883-ce09059eeffa');
      background-size: cover;
      background-position: center;
    }
    .container { max-width: 1200px; margin: auto; padding: 20px; }
    h1 { text-align: center; color: white; margin-bottom: 20px; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: stretch; }
    .card { background: rgba(255,255,255,0.95); padding: 20px; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.25); display: flex; flex-direction: column; }
    .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-grow: 1; }
    label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 4px; }
    input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }

    #analyzeBtn, #summary { width: 480px; max-width: 100%; margin: 15px auto; display: block; border-radius: 10px; font-size: 18px; text-align: center; }
    #analyzeBtn { padding: 14px; background: linear-gradient(90deg, #4CAF50, #2E7D32); color: white; border: none; cursor: pointer; transition: 0.3s; }
    #analyzeBtn:hover { background: linear-gradient(90deg, #66BB6A, #388E3C); }
    #summary { margin-top: 10px; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 25px 0; }
    .kpi { background: white; padding: 12px; border-radius: 10px; text-align: center; }
    .kpi-value { font-size: 18px; font-weight: bold; }
    .positive { color: #2E7D32; } 
    .negative { color: #C62828; } 
    .neutral { color: black; }

    .insights { background: white; padding: 12px; border-radius: 10px; margin-top: 20px; text-align: left; }

    table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 15px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background: #4CAF50; color: white; }

    .highlight-positive { background: #2E7D32; color: white; font-weight: bold; }

    .chart-container { margin-top: 25px; margin-bottom: 25px; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.95); }
    .monthly-table { margin-top: 15px; margin-bottom: 15px; }
    .hidden { display: none; }

    @media(max-width:1000px){
      .grid { grid-template-columns: 1fr; gap: 20px; }
    }

    /* ===== MOBILE LAYER ===== */
    .mobile-app { display: none; max-width: 500px; margin: auto; padding: 15px; background: rgba(255,255,255,0.95); border-radius: 20px; box-shadow: 0 6px 18px rgba(0,0,0,0.25); }
    .mobile-app .step { display: none; flex-direction: column; gap: 10px; }
    .mobile-app .step.active { display: flex; }
    .mobile-app label { font-size: 14px; font-weight: bold; color: #333; }
    .mobile-app input[type="text"], .mobile-app input[type="number"], .mobile-app input[type="range"] { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #ccc; box-sizing: border-box; }
    .mobile-nav { display: flex; justify-content: space-between; margin-top: 15px; }
    .mobile-nav button { flex: 1; margin: 0 5px; padding: 12px; border-radius: 12px; border: none; font-size: 16px; cursor: pointer; }
    .mobile-nav .primary { background: #4CAF50; color: white; }
    .mobile-results { margin-top: 20px; }
    @media(max-width:600px){ body { background-position: top; } .container { padding:10px; } }
  </style>
</head>
<body>
<div class="container">
<h1>🏡 Investment Property Analyzer</h1>

<div class="grid">
  <div class="card">
    <h3>Purchase & Financing</h3>
    <div class="input-group">
      <div><label>Purchase Price</label><input class="dollar" id="price" type="text" value="$350,000.0"></div>
      <div><label>Down Payment</label><input class="percent" id="down" type="text" value="40.0%"></div>
      <div><label>Interest Rate</label><input class="percent" id="rate" type="text" value="6.25%"></div>
      <div><label>Loan Term (Years)</label><input id="term" type="number" value="30"></div>
      <div><label>Closing Costs</label><input class="percent" id="closing" type="text" value="2.5%"></div>
    </div>
  </div>

  <div class="card">
    <h3>Income & Expenses</h3>
    <div class="input-group">
      <div><label>Monthly Rent</label><input class="dollar" id="rent" type="text" value="$2,850.0"></div>
      <div><label>Rent Growth</label><input class="percent" id="rentGrowth" type="text" value="3.0%"></div>
      <div><label>Vacancy</label><input class="percent" id="vacancy" type="text" value="5.0%"></div>
      <div><label>Management</label><input class="percent" id="management" type="text" value="10.0%"></div>
      <div><label>Maintenance</label><input class="percent" id="maintenance" type="text" value="10.0%"></div>
      <div><label>HOA</label><input class="dollar" id="hoa" type="text" value="$315.0"></div>
      <div><label>Annual Taxes</label><input class="dollar" id="taxes" type="text" value="$6,900.0"></div>
      <div><label>Annual Insurance</label><input class="dollar" id="insurance" type="text" value="$2,200.0"></div>
      <div><label>Expense Growth</label><input class="percent" id="expenseGrowth" type="text" value="3.0%"></div>
    </div>
  </div>

  <div class="card">
    <h3>Exit</h3>
    <div class="input-group">
      <div><label>Hold Years</label><input id="years" type="number" value="10"></div>
      <div><label>Appreciation</label><input class="percent" id="appreciation" type="text" value="3.0%"></div>
    </div>
  </div>
</div>

<button id="analyzeBtn">Analyze Deal</button>
<div id="summary" class="hidden"></div>

<div id="results" class="hidden">
  <div id="loanInfo" class="kpi-grid"></div>
  <div id="kpis" class="kpi-grid"></div>
  <div id="insights" class="insights"></div>
  <div class="chart-container card"><canvas id="chart"></canvas></div>
  <div class="monthly-table card">
    <h3>1st year financials</h3>
    <div id="monthlyTableContainer"></div>
  </div>
  <div class="card" id="table"></div>
</div>
</div>

<!-- ===== MOBILE LAYER ===== -->
<div class="mobile-app" id="mobileApp">
  <div class="step active" id="m-step1">
    <h2>🏡 Purchase</h2>
    <label>Purchase Price</label>
    <input class="dollar" id="m-price" type="text" value="$350,000.0">
    <label>Down Payment: <span id="m-down-val">40%</span></label>
    <input type="range" id="m-down" min="0" max="100" step="1" value="40">
    <label>Interest Rate: <span id="m-rate-val">6.25%</span></label>
    <input type="range" id="m-rate" min="0" max="15" step="0.05" value="6.25">
    <label>Loan Term</label>
    <input id="m-term" type="number" value="30">
  </div>

  <div class="step" id="m-step2">
    <h2>💰 Income</h2>
    <label>Monthly Rent</label>
    <input class="dollar" id="m-rent" value="$2,850.0">
    <label>Rent Growth: <span id="m-rg-val">3%</span></label>
    <input type="range" id="m-rg" min="0" max="10" step="0.5" value="3">
  </div>

  <div class="step" id="m-step3">
    <h2>📉 Expenses</h2>
    <label>Vacancy: <span id="m-vac-val">5%</span></label>
    <input type="range" id="m-vac" min="0" max="20" step="1" value="5">
    <label>Management: <span id="m-mgmt-val">10%</span></label>
    <input type="range" id="m-mgmt" min="0" max="20" step="1" value="10">
    <label>Maintenance: <span id="m-maint-val">10%</span></label>
    <input type="range" id="m-maint" min="0" max="20" step="1" value="10">
    <label>Taxes</label>
    <input class="dollar" id="m-taxes" value="$6,900.0">
    <label>Insurance</label>
    <input class="dollar" id="m-ins" value="$2,200.0">
    <label>HOA</label>
    <input class="dollar" id="m-hoa" value="$315.0">
  </div>

  <div class="step" id="m-step4">
    <h2>📈 Exit</h2>
    <label>Hold Years</label>
    <input id="m-years" type="number" value="10">
    <label>Appreciation: <span id="m-appr-val">3%</span></label>
    <input type="range" id="m-appr" min="0" max="10" step="0.5" value="3">
  </div>

  <div class="mobile-results hidden" id="m-results"></div>

  <div class="mobile-nav">
    <button onclick="prevStep()">←</button>
    <button onclick="nextStep()">→</button>
    <button onclick="analyzeMobile()" class="primary">Analyze</button>
  </div>
</div>

<script>
/* ====== DESKTOP FUNCTIONS ====== */

function pct(n){return n.toFixed(1)+"%";}
function clsVal(val, type){
  if(type==='positiveIf>0') return val>0?'positive':'neutral';
  if(type==='negativeIf<0') return val<0?'negative':'positive';
  if(type==='dscr') return val<1?'negative':'positive';
  return 'neutral';
}
// ...rest of your original analyze() function code...
document.getElementById('analyzeBtn').addEventListener('click', analyze);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

/* ====== MOBILE FUNCTIONS (SAFE) ====== */
function prevStep(){/* mobile navigation logic */ }
function nextStep(){/* mobile navigation logic */ }
function analyzeMobile(){/* separate function for mobile analyze, will not touch desktop */}
</script>
</body>
</html>
